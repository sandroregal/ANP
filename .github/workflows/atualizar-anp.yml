name: Atualizar dados ANP

on:
  schedule:
    # Roda dia 20, 25 e 28 de cada mês às 13:00 UTC (10:00 BRT)
    - cron: '0 13 20,25,28 * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verificar e atualizar dados ANP
        run: python scripts/atualizar_anp.py

      - name: Verificar mudanças
        id: check
        run: |
          if git diff --quiet index.html && [ -z "$(git ls-files --others --exclude-standard data_*.js)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Sem alterações nos dados."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Dados atualizados!"
          fi

      - name: Commit e push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          # Adicionar data files se existem (modo split)
          for f in data_*.js; do [ -f "$f" ] && git add "$f"; done
          # Remover data files antigos do tracking se não existem mais
          for f in $(git ls-files "data_*.js"); do [ ! -f "$f" ] && git rm "$f"; done
          MES_REF=$(python -c "from datetime import date, timedelta; d=date.today().replace(day=1)-timedelta(1); print(d.strftime('%b/%Y'))")
          git commit -m "Atualiza dados ANP - ref. $MES_REF"
          git push
